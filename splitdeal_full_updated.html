const Icon = ({ name, size = 20, color, className = '', strokeWidth = 2 }) => {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      ref.current.innerHTML = '';
      const el = document.createElement('i');
      el.setAttribute('data-lucide', name);
      ref.current.appendChild(el);
      lucide.createIcons({ nodes: [ref.current] });
      const svg = ref.current.querySelector('svg');
      if (svg) {
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke-width', strokeWidth);
        if (color) svg.setAttribute('stroke', color);
        svg.style.display = 'block';
      }
    }
  }, [name, size, color, strokeWidth]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
};

// Dynamic User Initialization from Login
const getAuthUser = () => {
  const saved = localStorage.getItem('sd_currentUser');
  if (!saved) return {
    id: 'guest', displayName: 'Guest', profileImage: null,
    interests: [], locationEnabled: true, locationLabel: 'San Francisco',
    radiusKm: 5, trustScore: 4.9, completedDeals: 0, myPools: []

  const u = JSON.parse(saved);
  return { 
    id: u.username, 
    displayName: u.fullName || u.username, 
    profileImage: u.pfp || null,
    interests: u.interests || [],
    locationEnabled: u.locationEnabled ?? true,
    locationLabel: u.locationLabel || 'San Francisco',
    radiusKm: u.radiusKm || 5,
    trustScore: 4.9, completedDeals: 24,
    myPools: []
  };
};
const SEED_USER = getAuthUser();


// ========== STORE ==========
function useStore() {
  const init = (key, seed) => {
    const stored = localStorage.getItem('sd_' + key);
    if (!stored) { localStorage.setItem('sd_' + key, JSON.stringify(seed)); return seed; }
    return JSON.parse(stored);
  };

  const logout = () => {
    try {
      Object.keys(localStorage)
        .filter(k => k.startsWith('sd_'))
        .forEach(k => localStorage.removeItem(k));
    } catch (e) {}
    // Redirect to login page
    window.location.href = 'login.html';
  };

  const normalizeOffers = (list) => list.map(o => {
    if (o.locationLat != null && o.locationLng != null) return o;
    if (o.location && o.location.lat != null && o.location.lng != null) {
      return { ...o, locationLat: o.location.lat, locationLng: o.location.lng, locationLabel: o.locationLabel || o.storeLocation || null };
    }
    return { ...o, locationLat: o.locationLat ?? null, locationLng: o.locationLng ?? null, locationLabel: o.locationLabel ?? o.storeLocation ?? null };
  });

  const [offers, setOffersState] = useState(() => normalizeOffers(init('offers', SEED_OFFERS)));
  const [messages, setMessagesState] = useState(() => init('messages', SEED_MESSAGES));
  const [notifications, setNotificationsState] = useState(() => init('notifications', SEED_NOTIFICATIONS));
  const [user, setUserState] = useState(() => {
    const stored = init('user', SEED_USER);
    // Ensure all required fields exist with defaults
    return {
      ...stored,
      interests: stored.interests || [],
      locationEnabled: stored.locationEnabled ?? true,
      locationLabel: stored.locationLabel || 'San Francisco',
      radiusKm: stored.radiusKm || 5,
      trustScore: stored.trustScore || 4.9,
      completedDeals: stored.completedDeals || 0,
      myPools: stored.myPools || [],
    };

  const [myJoined, setMyJoinedState] = useState(() => {
    const stored = localStorage.getItem('sd_myJoined');
    if (!stored) { const init = [3, 7]; localStorage.setItem('sd_myJoined', JSON.stringify(init)); return init; }
    return JSON.parse(stored);
  });
  const [mySaved, setMySavedState] = useState(() => {
    const stored = localStorage.getItem('sd_mySaved');
    if (!stored) { localStorage.setItem('sd_mySaved', JSON.stringify([])); return []; }
    return JSON.parse(stored);
  });
  const [myPassed, setMyPassedState] = useState(() => {
    const stored = localStorage.getItem('sd_myPassed');
    if (!stored) { localStorage.setItem('sd_myPassed', JSON.stringify([])); return []; }
    return JSON.parse(stored);
  });
  const [myMuted, setMyMutedState] = useState(() => {
    const stored = localStorage.getItem('sd_myMuted');
    if (!stored) { localStorage.setItem('sd_myMuted', JSON.stringify([])); return []; }
    return JSON.parse(stored);
  });
  // Purchase pools stored locally
  const [myPools, setMyPoolsState] = useState(() => {
    const stored = localStorage.getItem('sd_myPools');
    if (!stored) { localStorage.setItem('sd_myPools', JSON.stringify([])); return []; }
    return JSON.parse(stored);
  });

  const save = (key, val) => localStorage.setItem('sd_' + key, JSON.stringify(val));

  // Minimal receipt verification stub (prevents runtime crash)
  // Marks the deal as verified for the current user and logs a system message.
  const uploadReceipt = (offerId) => {
    const id = Number(offerId);
    if (!id) return;
    // Add a verified flag on the offer (if not present) and push a system message.
    setOffers(offers.map(o => {
      if (o.id !== id) return o;
      return { ...o, verified: true, status: o.status === 'waiting' ? 'ready' : o.status };
    }));
    const systemMsg = { 
      id: nextMsgId.current++,
      offerId: id,
      from: 'System',
      role: 'system',
      text: `Receipt uploaded. Deal verified.`,
      createdAt: new Date().toISOString() 
    };
    setMessages({ ...messages, [id]: [...(messages[id] || []), systemMsg] });
  };

  const setOffers = v => { setOffersState(v); save('offers', v); };
  const setMessages = v => { setMessagesState(v); save('messages', v); };
  const setNotifications = v => { setNotificationsState(v); save('notifications', v); };
  const setUser = v => { setUserState(v); save('user', v); };
  const setMyJoined = v => { setMyJoinedState(v); save('myJoined', v); };
  const setMySaved = v => { setMySavedState(v); save('mySaved', v); };
  const setMyPassed = v => { setMyPassedState(v); save('myPassed', v); };
  const setMyMuted = v => { setMyMutedState(v); save('myMuted', v); };
  const setMyPools = v => { setMyPoolsState(v); save('myPools', v); };

  let nextMsgId = useRef(200);
  let nextPoolId = useRef(100);

  const joinOffer = (id) => {
    setOffers(offers.map(o => {
      if (o.id !== id) return o;
      const newCount = Math.min(o.neededCount, o.joinedCount + 1);
      const newStatus = newCount >= o.neededCount ? 'ready' : 'waiting';
      return { ...o, joinedCount: newCount, status: newStatus, participants: [...o.participants, { label: user.displayName, userId: 'guest-user' }] };
    }));
    if (!myJoined.includes(id)) setMyJoined([...myJoined, id]);
    const offer = offers.find(o => o.id === id);
    if (offer) {
      const systemMsg = { id: nextMsgId.current++, offerId: id, from: 'System', role: 'system', text: `${user.displayName} joined the group.`, createdAt: new Date().toISOString() };
      setMessages({ ...messages, [id]: [...(messages[id] || []), systemMsg] });
    }
  };

  const leaveOffer = (id) => {
    setOffers(offers.map(o => {
      if (o.id !== id) return o;
      const newCount = Math.max(0, o.joinedCount - 1);
      return { ...o, joinedCount: newCount, status: newCount >= o.neededCount ? 'ready' : 'waiting', participants: o.participants.filter(p => p.userId !== 'guest-user') };
    }));
    setMyJoined(myJoined.filter(i => i !== id));
  };

  const saveOffer = (id) => {
    if (!mySaved.includes(id)) setMySaved([...mySaved, id]);
  };
  const unsaveOffer = (id) => setMySaved(mySaved.filter(i => i !== id));
  const passOffer = (id) => { if (!myPassed.includes(id)) setMyPassed([...myPassed, id]); };
  const toggleMuteOffer = (id) => setMyMuted(myMuted.includes(id) ? myMuted.filter(i => i !== id) : [...myMuted, id]);

  const completeOffer = (id) => {
    setOffers(offers.map(o => o.id === id ? { ...o, status: 'completed' } : o));
    const systemMsg = { id: nextMsgId.current++, offerId: id, from: 'System', role: 'system', text: 'Deal marked as completed by the group.', createdAt: new Date().toISOString() };
    setMessages({ ...messages, [id]: [...(messages[id] || []), systemMsg] });
    const newNotif = { id: Date.now(), title: 'Deal completed!', text: 'You can now rate the experience.', kind: 'done', read: false, offerId: id, createdAt: new Date().toISOString() };
    setNotifications([newNotif, ...notifications]);
  };

  const sendMessage = (offerId, text, from = user.displayName || 'Alex', role = 'me') => {
    const msg = { id: nextMsgId.current++, offerId, from, role, text, createdAt: new Date().toISOString() };
    setMessages({ ...messages, [offerId]: [...(messages[offerId] || []), msg] });
  };

  const markNotificationRead = (id) => {
    setNotifications(notifications.map(n => n.id === id ? { ...n, read: true } : n));
  };

  const createOffer = (data) => {
    const newId = Math.max(...offers.map(o => o.id), 0) + 1;
    const locationLat = data.locationLat ?? null;
    const locationLng = data.locationLng ?? null;
    const locationLabel = data.locationLabel ?? data.storeLocation ?? null;
    const newOffer = {
      id: newId,
      ...data,
      locationLat, locationLng, locationLabel,
      storeLocation: data.storeLocation ?? locationLabel ?? '',
      status: 'waiting', joinedCount: 1, verified: false, saved: false,
      participants: [{ label: user.displayName, userId: 'guest-user' }],
      createdAt: new Date().toISOString(),
    };
    setOffers([newOffer, ...offers]);
    setMyJoined([...myJoined, newId]);
    const welcome = { id: nextMsgId.current++, offerId: newId, from: 'System', role: 'system', text: 'Deal created! Waiting for people to join.', createdAt: new Date().toISOString() };
    setMessages({ ...messages, [newId]: [welcome] });
    return newId;
  };

  // Create a purchase pool for an existing offer
  const createPool = (offerId, quantity) => {
    const poolId = nextPoolId.current++;
    const pool = {
      id: poolId,
      offerId,
      totalQuantity: Number(quantity) || 1,
      participants: [{ name: user.displayName, quantity: Number(quantity) || 1, joinedAt: new Date().toISOString() }],
      createdAt: new Date().toISOString(),
    };
    const updated = [...myPools, pool];
    setMyPools(updated);
    return poolId;
  };

  // Join an existing pool
  const joinPool = (poolId, quantity) => {
    const updated = myPools.map(p => {
      if (p.id !== poolId) return p;
      return {
        ...p,
        totalQuantity: p.totalQuantity + (Number(quantity) || 1),
        participants: [...p.participants, { name: user.displayName, quantity: Number(quantity) || 1, joinedAt: new Date().toISOString() }],
      };
    });
    setMyPools(updated);
  };

  const updateUser = (data) => setUser({ ...user, ...data });
  const unreadCount = notifications.filter(n => !n.read).length;

  // ========== BUYER MATCHING ENGINE ==========
  // Auto-matches users who want the same product based on interests + store + deal type
  const getBuyerMatches = useCallback(() => {
    const matches = [];
    const unjoined = offers.filter(o => !myJoined.includes(o.id) && o.status !== 'completed' && o.category && o.store);

    for (const offer of unjoined) {
      // Match by category overlap with user interests
      const interestMatch = (user.interests || []).some(i => i.toLowerCase() === (offer.category || '').toLowerCase());
      // Match by deal type similarity
      const dealTypeMatch = offer.dealType.includes('Buy') || offer.dealType.includes('Bulk') || offer.dealType.includes('Group');
      // Match by proximity (within radius)
      const withinRadius = (offer.distance || 99) <= (user.radiusKm || 5);

      if (interestMatch && withinRadius) {
        const score = (interestMatch ? 50 : 0) + (dealTypeMatch ? 30 : 0) + (withinRadius ? 20 : 0);
        matches.push({
          offer,
          score,
          reason: interestMatch ? `You're interested in ${offer.category}` : 'Nearby deal',
          autoMatched: true,
        });
      }
    }
    matches.sort((a, b) => b.score - a.score);
    return matches;
  }, [offers, myJoined, user.interests, user.radiusKm]);

  // ========== PURCHASE POOLING ENGINE ==========
  // For each offer, check if there are pools that qualify for the promotion
  const getPoolStatus = useCallback((offer) => {
    const pools = myPools.filter(p => p.offerId === offer.id);
    const totalQty = pools.reduce((s, p) => s + p.totalQuantity, 0);
    return { pools, totalQty };
  }, [myPools]);

  // Helper: parse deal type to get minimum quantity needed
  const getMinQuantity = (dealType) => {
    if (dealType.includes('Buy 2')) return 2;
    if (dealType.includes('Buy 3')) return 3;
    if (dealType.includes('Buy 4')) return 4;
    if (dealType.includes('Buy 5')) return 5;
    if (dealType.includes('Bulk') || dealType.includes('Group')) return 3;
    return 2;
  };

  const estimatedSavings = (offer) => {
    const deal = offer.dealType || '';
    const price = offer.pricePerPerson || 0;
    if (deal.includes('20%')) return Math.round(price * 0.2 * 100) / 100;
    if (deal.includes('15%')) return Math.round(price * 0.15 * 100) / 100;
    if (deal.includes('25%')) return Math.round(price * 0.25 * 100) / 100;
    if (deal.includes('Free')) return Math.round(price * 100) / 100;
    return Math.round(price * 0.1 * 100) / 100;
  };

  return {
    offers, messages, notifications, user, myJoined, mySaved, myPassed, myMuted, myPools,
    joinOffer, leaveOffer, saveOffer, unsaveOffer, completeOffer,
    passOffer, toggleMuteOffer, sendMessage, markNotificationRead, createOffer, updateUser, logout, unreadCount,
    createPool, joinPool, getBuyerMatches, getPoolStatus, getMinQuantity, estimatedSavings,
    uploadReceipt,
  };
}


function useRouter() {
  const [path, setPath] = useState(window.location.hash.slice(1) || '/');
  useEffect(() => {
    const handler = () => setPath(window.location.hash.slice(1) || '/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  const navigate = (to) => { window.location.hash = to; };
  return { path, navigate };
}


function timeAgo(isoStr) {
  const diff = (Date.now() - new Date(isoStr).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function formatTime(isoStr) {
  const d = new Date(isoStr);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function Avatar({ label, size = 28, image }) {
  const colors = ['#0071E3','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16'];

  return (
    <div style={{ width: size, height: size, borderRadius: 999, background: image ? 'transparent' : color, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: Math.floor(size * 0.36), fontWeight: 700, flexShrink: 0, border: '2px solid #fff', overflow: 'hidden' }}>
      {image ? <img src={image} alt={label} className="avatar-img" /> : label.slice(0, 2).toUpperCase()}

}

function Badge({ children, variant = 'default' }) {
  const styles = {
    waiting: 'badge-waiting',
    ready: 'badge-ready',
    completed: 'badge-completed',
    verified: 'badge-verified',
  };
  return (
    <span className={`inline-flex items-center font-bold text-[11px] px-2 py-[3px] rounded-lg ${styles[variant] || 'badge-waiting'}`}>
      {children}
    </span>
  );
}

function DealExplain({ dealType }) {
  const t = dealType || '';
  let explain = '';
  if (t.includes('Buy 2 Get 1') || t.includes('Buy 2, Get 1')) explain = 'Get 1 item free when you buy 2 together';
  else if (t.includes('Buy 3 Get 1') || t.includes('Buy 3, Get 1')) explain = 'Get 1 item free when you buy 3 together';
  else if (t.includes('Buy 4 Get 1') || t.includes('Buy 4, Get 1')) explain = 'Get 1 item free when you buy 4 together';
  else if (t.includes('Buy 4')) explain = 'Buy 4 items to unlock the free item';
  else if (t.includes('20%')) explain = '20% off your total when 3+ people join';
  else if (t.includes('15%')) explain = '15% off your total when 4+ people join';
  else if (t.includes('25%')) explain = '25% off your total when 3+ people join';
  else if (t.includes('Group')) explain = 'Special group rate available when enough people join';
  else if (t.includes('Bulk')) explain = 'Bulk discount applied when minimum basket is reached';
  else if (t.includes('Free Shipping')) explain = 'Free shipping unlocked with group orders';
  else if (t.includes('Annual') || t.includes('Shared')) explain = 'Share the cost of an annual plan among members';
  else if (t.includes('Strength')) explain = 'No minimum required — more people = better deals';
  if (!explain) explain = 'Group deal — more people means bigger savings';
  return <div className="deal-explain"><Icon name="info" size={12} color="#0071E3" style={{ marginRight: 4 }} />{explain}</div>;
}


function OfferCard({ offer, onJoin, onPass, isJoined, onChatClick, style = {}, savings }) {

  const isCompleted = offer.status === 'completed';
  const needMore = offer.neededCount - offer.joinedCount;

  const handlePass = () => {
    setIsExiting(true);
    setTimeout(() => onPass(), 350);
  };

  return (
    <div className={`card animate-in glow-card ${isExiting ? 'card-exiting' : ''}`} style={{ ...style, boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
      <div style={{ position: 'relative', height: 148, overflow: 'hidden', background: '#E5E9EF' }}>
        <img src={offer.imageUrl} alt={offer.store} style={{ width: '100%', height: '100%', objectFit: 'cover' }} onError={e => { e.target.style.display='none'; }} />
        <div style={{ position: 'absolute', top: 12, left: 12, display: 'flex', gap: 6, flexWrap: 'wrap' }}>

        </div>
        {offer.verified && (
          <div style={{ position: 'absolute', top: 12, right: 12 }}>
            <Badge variant="verified">Verified</Badge>
          </div>
        )}
      </div>
      <div style={{ padding: '16px 16px 18px' }}>
        <div style={{ marginBottom: 4 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: '#6B7280', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 3 }}>
            <span style={{ fontWeight: 700 }}>{offer.store}</span>
            <span style={{ color: '#0071E3' }}>{offer.category}</span>
          </div>
          <h3 style={{ fontWeight: 800, fontSize: 17, lineHeight: 1.25, color: '#111827' }}>{offer.title}</h3>
          <div style={{ marginTop: 3, fontSize: 11, color: '#6B7280', fontWeight: 600 }}>{offer.dealType}</div>
        </div>

        <div style={{ display: 'flex', gap: 16, fontSize: 13, color: '#6B7280', fontWeight: 600, margin: '10px 0 12px' }}>
          <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="users" size={14} color="#0071E3" /> {offer.joinedCount}/{offer.neededCount}</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="map-pin" size={14} color="#0071E3" /> {offer.distance}km</span>
          <span style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Icon name="clock" size={14} color="#0071E3" /> {offer.expiresIn}m</span>
        </div>

        <DealExplain dealType={offer.dealType} />

        <div style={{ marginTop: 12, marginBottom: 12 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, fontWeight: 700, marginBottom: 6 }}>
            <span style={{ color: pct === 100 ? '#15803d' : '#0071E3' }}>{pct}% Complete</span>
            <span style={{ color: '#6B7280' }}>{needMore > 0 ? `Need ${needMore} more` : 'Full!'}</span>
          </div>
          <div className="progress-bar">
            <div className="progress-fill" style={{ width: `${pct}%`, background: pct === 100 ? '#22c55e' : '#0071E3' }} />
          </div>
        </div>

        {offer.participants.length > 0 && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 14 }}>
            <div className="avatar-stack">
              {offer.participants.slice(0, 4).map((p, i) => (
                <div key={i} className="av" style={{ zIndex: 4 - i }}>{p.label.slice(0, 2).toUpperCase()}</div>
              ))}
              {offer.participants.length > 4 && <div className="av">+{offer.participants.length - 4}</div>}
            </div>
            <span style={{ fontSize: 12, color: '#6B7280', fontWeight: 500 }}>are in this deal</span>
          </div>
        )}

        {!isCompleted && (
          isJoined ? (
            <button className="btn-primary w-full" style={{ height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, width: '100%' }} onClick={onChatClick}>
              <Icon name="message-square" size={16} color="#fff" /> Open Chat
            </button>
          ) : (
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn-outline" style={{ flex: 1, height: 48 }} onClick={handlePass}>Pass</button>
              <button className="btn-primary" style={{ flex: 2, height: 48 }} onClick={onJoin}>Join Deal</button>
            </div>
          )
        )}
      </div>
    </div>
  );
}

const CATEGORIES = ['All', 'Food', 'Coffee', 'Groceries', 'Electronics', 'Beauty', 'Clothing'];


function Home({ store, navigate }) {
  const [activeCategory, setActiveCategory] = useState('All');
  const [search, setSearch] = useState('');
  const { offers, myJoined, mySaved, myPassed, joinOffer, passOffer, unreadCount, user, estimatedSavings } = store;

  const [pickedInterests, setPickedInterests] = useState([]);
  const [filterOpen, setFilterOpen] = useState(false);
  const [geoAlert, setGeoAlert] = useState(null);

  useEffect(() => {
    const hotDeals = offers.filter(o => !myJoined.includes(o.id) && !myPassed.includes(o.id) && (o.joinedCount / o.neededCount) >= 0.75 && o.status !== 'ready' && o.status !== 'completed');
    if (hotDeals.length > 0) setGeoAlert(`Hot deal nearby! ${hotDeals[0].store} needs ${hotDeals[0].neededCount - hotDeals[0].joinedCount} more.`);
  }, [offers, myJoined, myPassed]);

  useEffect(() => {
    if (!user?.interests) return;
    if (!filterOpen) setPickedInterests([...(user.interests || [])]);
  }, [user?.interests, filterOpen]);

  const filtered = offers.filter(o => {
    if (o.status === 'completed') return false;
    if (myPassed.includes(o.id)) return false;
    if (activeCategory === '__interests__') {
      const allowed = (pickedInterests || []).map(x => (x || '').toLowerCase());
      if (!allowed.includes((o.category || '').toLowerCase())) return false;
    } else {
      if (activeCategory !== 'All' && o.category && o.category.toLowerCase() !== activeCategory.toLowerCase()) return false;
    }
    if (search && !o.store.toLowerCase().includes(search.toLowerCase()) && !o.title.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  return (
    <div style={{ minHeight: '100vh', background: '#F2F5F8' }}>
      <header className="header-blur" style={{ position: 'sticky', top: 0, zIndex: 50, padding: '12px 16px 12px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
            {/* PFP in top-left */}
            <PfpButton user={user} onClick={() => navigate('/profile')} />
            <div>
              <div style={{ fontWeight: 800, fontSize: 20, letterSpacing: '-0.02em', color: '#111827' }}>{user.displayName}</div>
              <div style={{ fontSize: 11, color: '#6B7280', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 3 }}>
                <Icon name="map-pin" size={11} color="#9CA3AF" /> {user.locationLabel || (user.locationEnabled ? 'Your current location' : 'Location hidden')}
              </div>
            </div>
          </div>
          <button onClick={() => navigate('/notifications')} style={{ position: 'relative', background: 'transparent', border: 'none', cursor: 'pointer', padding: 6, borderRadius: 999 }}>
            <Icon name="bell" size={24} color="#374151" />
            {unreadCount > 0 && <span style={{ position: 'absolute', top: 6, right: 6, width: 8, height: 8, background: '#ef4444', borderRadius: 999, border: '2px solid #F2F5F8' }} />}
          </button>
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          <div style={{ flex: 1, position: 'relative' }}>
            <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)' }}>
              <Icon name="search" size={18} color="#9CA3AF" />
            </div>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search deals, stores..." style={{ width: '100%', height: 44, paddingLeft: 42, paddingRight: 12, borderRadius: 999, border: '1.5px solid #E5E9EF', background: 'rgba(243,244,246,0.7)', fontSize: 14, fontWeight: 500, outline: 'none', color: '#111827' }} />
          </div>
        </div>
      </header>

      {geoAlert && (
        <div className="animate-in" style={{ background: '#fef3c7', color: '#92400e', padding: '12px 16px', fontSize: 13, fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: '1px solid #fde68a' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="map-pin" size={16} color="#d97706" /><span>{geoAlert}</span></div>
          <button onClick={() => setGeoAlert(null)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}><Icon name="x" size={16} color="#d97706" /></button>
        </div>
      )}

      <div style={{ padding: '10px 0', background: '#F2F5F8' }}>
        <div className="scrollbar-none" style={{ display: 'flex', gap: 8, padding: '0 16px', overflowX: 'auto' }}>
          {CATEGORIES.map(c => (
            <button key={c} onClick={() => { setActiveCategory(c); setFilterOpen(false); }} className={`category-chip ${activeCategory === c ? 'category-chip-active' : 'category-chip-inactive'}`}>
              {c}
            </button>
          ))}
          <button
            onClick={() => { if ((user?.interests || []).length) { setActiveCategory('__interests__'); setFilterOpen(v => !v); } }}
            className={`category-chip ${activeCategory === '__interests__' ? 'category-chip-active' : 'category-chip-inactive'}`}
            style={{ opacity: (user?.interests?.length ? 1 : 0.5), pointerEvents: (user?.interests?.length ? 'auto' : 'none') }}
          >
            My Interests
          </button>
        </div>
        {filterOpen && activeCategory === '__interests__' && (
          <div style={{ padding: '12px 16px 0' }}>
            <div className="card" style={{ padding: 14, borderRadius: 20 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <div>
                  <div style={{ fontWeight: 900, fontSize: 14 }}>Pick what you want to see</div>
                  <div style={{ fontSize: 12, color: '#6B7280', fontWeight: 600, marginTop: 2 }}>Showing: {pickedInterests.length ? pickedInterests.join(', ') : 'None'}</div>
                </div>
                <button onClick={() => setFilterOpen(false)} style={{ background: 'transparent', border: 'none', cursor: 'pointer', fontSize: 20, fontWeight: 900, color: '#374151' }}>×</button>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                {(user?.interests || []).length === 0 ? (
                  <div style={{ fontSize: 13, color: '#6B7280', fontWeight: 700 }}>Add interests in your Profile to use filtering.</div>
                ) : (user.interests || []).map(interest => {
                  const active = pickedInterests.includes(interest);
                  return (
                    <button key={interest} onClick={() => setPickedInterests(prev => prev.includes(interest) ? prev.filter(x => x !== interest) : [...prev, interest])} className={`interest-chip ${active ? 'interest-chip-active' : 'interest-chip-inactive'}`}>{interest}</button>
                  );
                })}
              </div>
              <div style={{ display: 'flex', gap: 10, marginTop: 12 }}>
                <button className="btn-outline" style={{ flex: 1, height: 44 }} onClick={() => setPickedInterests([...(user?.interests || [])])}>Select All</button>
                <button className="btn-primary" style={{ flex: 1, height: 44 }} onClick={() => setFilterOpen(false)}>Done</button>
              </div>
            </div>
          </div>
        )}
      </div>

      <main style={{ padding: '4px 16px 120px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {filtered.length === 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 16px', textAlign: 'center' }}>
            <div style={{ width: 80, height: 80, background: '#fff', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20, border: '1.5px solid #E5E9EF' }}>
              <Icon name="search" size={36} color="#D1D5DB" />
            </div>
            <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 8 }}>No hidden deals here</div>
            <div style={{ color: '#6B7280', marginBottom: 24, maxWidth: 240 }}>We couldn't find any deals matching your search. Be the first to start one!</div>
            <button className="btn-primary" style={{ padding: '12px 32px', fontSize: 15 }} onClick={() => navigate('/create')}>Create a Deal</button>
          </div>
        ) : filtered.map((offer, idx) => (
          <OfferCard
            key={offer.id}
            offer={{ ...offer, saved: mySaved.includes(offer.id) }}
            isJoined={myJoined.includes(offer.id)}
            savings={estimatedSavings(offer)}
            style={{ animationDelay: `${idx * 60}ms` }}
            onJoin={() => joinOffer(offer.id)}
            onPass={() => passOffer(offer.id)}
            onChatClick={() => navigate(`/chat/${offer.id}`)}
          />
        ))}
      </main>
    </div>
  );
}


function CreateOffer({ store, navigate }) {
  const { createOffer, user } = store;
  const [form, setForm] = useState({
    store: '', title: '', category: 'Food', dealType: 'BOGO',
    neededCount: 3, pricePerPerson: '',
    locationLabel: '', locationLat: null, locationLng: null,
    storeLocation: '', notes: ''
  });
  const [loading, setLoading] = useState(false);
  const [coverPhoto, setCoverPhoto] = useState(null);
  const fileInputRef = useRef(null);
  const locationMapNodeRef = useRef(null);
  const locationMapRef = useRef(null);
  const locationMarkerRef = useRef(null);
  const [locStatus, setLocStatus] = useState('Pick an exact location on the map');
  const [useCurrentGps, setUseCurrentGps] = useState(false);

  const categoryPhotos = {
    Food: 'https://images.unsplash.com/photo-1547592180-85f173990554?w=600&q=80',
    Coffee: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?w=600&q=80',
    Groceries: 'https://images.unsplash.com/photo-1542838132-92c53300491e?w=600&q=80',
    Electronics: 'https://images.unsplash.com/photo-1498049794561-7780e7231661?w=600&q=80',
    Beauty: 'https://images.unsplash.com/photo-1596462502278-27bfdc403348?w=600&q=80',
    Clothing: 'https://images.unsplash.com/photo-1445205170230-053b83016050?w=600&q=80',
    Other: 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=600&q=80'
  };

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const reverseGeocode = async (lat, lng) => {
    try {
      setLocStatus('Getting city & address…');
      const url = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${encodeURIComponent(lat)}&lon=${encodeURIComponent(lng)}`;
      const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
      if (!res.ok) throw new Error('Reverse geocode failed');
      const data = await res.json();
      const a = data?.address || {};
      const parts = [a.city || a.town || a.village || a.municipality, a.road || a.neighbourhood, a.house_number].filter(Boolean);
      const label = parts.length ? parts.join(', ') : (data?.display_name || 'Selected location');
      set('locationLabel', label);
      set('storeLocation', label);
      setLocStatus('Location selected');
    } catch (err) {
      set('locationLabel', `Lat ${lat.toFixed(5)}, Lng ${lng.toFixed(5)}`);
      set('storeLocation', `Lat ${lat.toFixed(5)}, Lng ${lng.toFixed(5)}`);
      setLocStatus('Location selected (address unavailable)');
    }
  };

  const setSelectedLocation = (lat, lng) => {
    set('locationLat', lat);
    set('locationLng', lng);
    if (locationMarkerRef.current) locationMarkerRef.current.setLatLng([lat, lng]);
    reverseGeocode(lat, lng);
  };

  useEffect(() => {
    if (!window.L || !locationMapNodeRef.current) return;
    if (locationMapRef.current) return;

    const startMap = (lat, lng) => {
      const map = window.L.map(locationMapNodeRef.current, { zoomControl: false }).setView([lat, lng], 14);
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
      window.L.control.zoom({ position: 'bottomright' }).addTo(map);
      locationMapRef.current = map;

      const marker = window.L.marker([lat, lng], { draggable: true }).addTo(map);
      locationMarkerRef.current = marker;

      marker.on('dragend', () => {
        const p = marker.getLatLng();
        setSelectedLocation(p.lat, p.lng);
      });
      map.on('click', (e) => {
        const { lat, lng } = e.latlng;
        marker.setLatLng([lat, lng]);
        setSelectedLocation(lat, lng);
      });

      setSelectedLocation(lat, lng);
    };

    if (navigator.geolocation) {
      setLocStatus('Centering picker…');
      navigator.geolocation.getCurrentPosition(
        ({ coords }) => startMap(coords.latitude, coords.longitude),
        () => startMap(37.7749, -122.4194),
        { enableHighAccuracy: true, timeout: 8000 }
      );
    } else {
      startMap(37.7749, -122.4194);
    }

    return () => { try { locationMapRef.current?.remove(); } catch(e){} locationMapRef.current = null; };
  }, []);

  const useMyGps = () => {
    setUseCurrentGps(true);
    setLocStatus('Getting your GPS coordinates…');
    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        ({ coords }) => {
          set('locationLat', coords.latitude);
          set('locationLng', coords.longitude);
          if (locationMarkerRef.current) locationMarkerRef.current.setLatLng([coords.latitude, coords.longitude]);
          reverseGeocode(coords.latitude, coords.longitude);
        },
        () => setLocStatus('Could not get GPS — tap the map instead'),
        { enableHighAccuracy: true, timeout: 10000 }
      );
    } else {
      setLocStatus('GPS not supported in this browser — tap the map to set location');
    }
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!form.store || !form.title || !form.pricePerPerson) return;
    if (form.locationLat == null || form.locationLng == null) { setLocStatus('Location is required'); return; }
    setLoading(true);
    setTimeout(() => {
      const id = createOffer({
        ...form,
        neededCount: Number(form.neededCount),
        pricePerPerson: Number(form.pricePerPerson),
        distance: (Math.random() * 3 + 0.2).toFixed(1) * 1,
        expiresIn: 60,
        imageUrl: coverPhoto || categoryPhotos[form.category],
        logo: form.store.slice(0, 2).toUpperCase(),
      });
      navigate(`/chat/${id}`);
    }, 600);
  };

  const inputStyle = { width: '100%', padding: '12px 0', borderBottom: '2px solid #E5E9EF', border: 'none', background: 'transparent', fontSize: 16, fontWeight: 600, outline: 'none', color: '#111827' };
  const selectStyle = { width: '100%', padding: '10px 12px', borderRadius: 12, border: '1.5px solid #E5E9EF', background: '#F9FAFB', fontSize: 14, fontWeight: 600, outline: 'none', color: '#111827' };
  const labelStyle = { fontSize: 12, fontWeight: 700, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 6, display: 'flex', alignItems: 'center', gap: 4 };

  return (
    <div style={{ minHeight: '100vh', background: '#F2F5F8' }}>
      <header className="header-blur" style={{ position: 'sticky', top: 0, zIndex: 50, padding: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button onClick={() => navigate('/')} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4, borderRadius: 999 }}>
          <Icon name="arrow-left" size={24} color="#374151" />
        </button>
        <span style={{ fontWeight: 800, fontSize: 18 }}>Create Deal</span>
        <div style={{ width: 28 }} />
      </header>

      <main style={{ padding: '16px 16px 120px' }}>
        <input ref={fileInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => { const file = e.target.files?.[0]; if (file) { const reader = new FileReader(); reader.onload = () => setCoverPhoto(reader.result); reader.readAsDataURL(file); } }} />
        <button type="button" onClick={() => fileInputRef.current?.click()} style={{ width: '100%', marginBottom: 12, background: '#fff', border: '2px dashed #E5E9EF', borderRadius: 20, padding: coverPhoto ? 0 : '32px 16px', minHeight: 130, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', overflow: 'hidden' }}>
          {coverPhoto ? <img src={coverPhoto} alt="Cover" style={{ width: '100%', height: 180, objectFit: 'cover' }} /> : <>
            <div style={{ width: 48, height: 48, background: 'rgba(0,113,227,0.1)', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 10 }}>
              <Icon name="upload" size={22} color="#0071E3" />
            </div>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 3 }}>Add Cover Photo</div>
            <div style={{ fontSize: 12, color: '#9CA3AF' }}>Choose from gallery</div>
          </>}
        </button>
        <div style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 4, marginBottom: 20 }}>
          {Object.entries(categoryPhotos).map(([category, photo]) => (
            <button type="button" key={category} onClick={() => setCoverPhoto(photo)} style={{ border: coverPhoto === photo ? '3px solid #0071E3' : '2px solid #fff', padding: 0, borderRadius: 12, overflow: 'hidden', background: '#fff', cursor: 'pointer', flexShrink: 0 }}>
              <img src={photo} alt={category} style={{ width: 62, height: 52, objectFit: 'cover', display: 'block' }} />
              <span style={{ fontSize: 9, fontWeight: 700 }}>{category}</span>
            </button>
          ))}
        </div>

        <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div className="card" style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 18 }}>
            <div>
              <div style={labelStyle}><Icon name="store" size={12} color="#9CA3AF" /> Store Name</div>
              <input style={inputStyle} placeholder="e.g. Costco, Blue Bottle..." value={form.store} onChange={e => set('store', e.target.value)} required />
            </div>
            <div>
              <div style={labelStyle}><Icon name="tag" size={12} color="#9CA3AF" /> Deal Title</div>
              <input style={inputStyle} placeholder="e.g. Buy 1 Get 1 Free Lattes" value={form.title} onChange={e => set('title', e.target.value)} required />
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <div style={labelStyle}>Category</div>
                <select style={selectStyle} value={form.category} onChange={e => set('category', e.target.value)}>
                  {['Food','Coffee','Groceries','Electronics','Beauty','Clothing','Other'].map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <div>
                <div style={labelStyle}>Deal Type</div>
                <select style={selectStyle} value={form.dealType} onChange={e => set('dealType', e.target.value)}>
                  {['BOGO','Bulk Discount','Group Rate','Split Pack','Catering'].map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
            </div>
          </div>

          <div className="card" style={{ padding: 20, display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <div>
                <div style={labelStyle}><Icon name="users" size={12} color="#9CA3AF" /> Total People</div>
                <input type="number" min="2" max="20" style={{ ...selectStyle, textAlign: 'center', fontSize: 20, fontWeight: 800 }} value={form.neededCount} onChange={e => set('neededCount', e.target.value)} />
              </div>
              <div>
                <div style={labelStyle}><Icon name="dollar-sign" size={12} color="#9CA3AF" /> Price/Person</div>
                <div style={{ position: 'relative' }}>
                  <span style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', fontWeight: 700, color: '#9CA3AF', fontSize: 16 }}>$</span>
                  <input type="number" step="0.01" min="0" style={{ ...selectStyle, paddingLeft: 28, fontSize: 18, fontWeight: 800 }} placeholder="0.00" value={form.pricePerPerson} onChange={e => set('pricePerPerson', e.target.value)} required />
                </div>
              </div>
            </div>
            <div>
              <div style={labelStyle}><Icon name="map-pin" size={12} color="#9CA3AF" /> Location (Required)</div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
                <button type="button" onClick={useMyGps} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '8px 16px', borderRadius: 999, background: useCurrentGps ? 'rgba(0,113,227,0.12)' : '#F3F4F6', border: '1.5px solid #E5E9EF', fontSize: 12, fontWeight: 700, color: useCurrentGps ? '#0071E3' : '#374151', cursor: 'pointer' }}>
                  <Icon name="navigation" size={14} color={useCurrentGps ? '#0071E3' : '#374151'} />
                  {useCurrentGps ? 'GPS Located' : 'Use My GPS'}
                </button>
                <span style={{ fontSize: 11, color: '#9CA3AF', fontWeight: 600 }}>or tap the map below</span>
              </div>
              <div style={{ height: 260, borderRadius: 16, overflow: 'hidden', border: '1.5px solid #E5E9EF', background: '#fff', position: 'relative' }}>
                <div ref={locationMapNodeRef} style={{ position: 'absolute', inset: 0 }} />
              </div>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#374151', marginTop: 10 }}>
                {form.locationLabel || locStatus}
              </div>
            </div>
          </div>

          <div className="card" style={{ padding: 20 }}>
            <div style={labelStyle}><Icon name="align-left" size={12} color="#9CA3AF" /> Notes</div>
            <textarea style={{ ...selectStyle, minHeight: 90, resize: 'none', paddingTop: 10 }} placeholder="Any details? e.g. 'I want the blue ones'" value={form.notes} onChange={e => set('notes', e.target.value)} />
          </div>

          <button type="submit" className="btn-primary" style={{ height: 56, fontSize: 16, width: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 16px rgba(0,113,227,0.3)' }} disabled={loading}>
            {loading ? 'Publishing...' : 'Publish Deal'}
          </button>
        </form>
      </main>
    </div>
  );
}


// ========== BUYER MATCHING PAGE ==========
function Matches({ store, navigate }) {
  const { offers, myJoined, getBuyerMatches, user } = store;
  const matches = getBuyerMatches();
  const activeMatches = offers.filter(o => myJoined.includes(o.id) && o.status !== 'completed');

  const [tab, setTab] = useState('joined'); // default: Joined first

  return (
    <div style={{ minHeight: '100vh', background: '#F2F5F8' }}>
      <header className="header-blur" style={{ position: 'sticky', top: 0, zIndex: 50, padding: '16px 16px 0' }}>
        <div style={{ fontWeight: 800, fontSize: 24, letterSpacing: '-0.02em' }}>Buyer Matches</div>
        <div style={{ fontSize: 13, color: '#9CA3AF', fontWeight: 600, marginTop: 2 }}>Automatically find people who want the same things</div>
        <div style={{ display: 'flex', gap: 16, marginTop: 14, borderBottom: '1px solid #E5E9EF' }}>
          <button onClick={() => setTab('auto')} className={tab === 'auto' ? 'tab-active' : 'tab-inactive'} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '8px 0', fontSize: 14, fontWeight: 800, borderBottom: tab === 'auto' ? '2px solid #0071E3' : '2px solid transparent' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="sparkles" size={16} /> Auto Matches</span>
          </button>
          <button onClick={() => setTab('joined')} className={tab === 'joined' ? 'tab-active' : 'tab-inactive'} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: '8px 0', fontSize: 14, fontWeight: 800, borderBottom: tab === 'joined' ? '2px solid #0071E3' : '2px solid transparent' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="users" size={16} /> Joined ({activeMatches.length})</span>
          </button>
        </div>
      </header>

      <main style={{ padding: '12px 16px 120px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {tab === 'auto' ? (
          matches.length === 0 ? (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 16px', textAlign: 'center' }}>
              <div style={{ width: 80, height: 80, background: '#fff', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20, border: '1.5px solid #E5E9EF' }}>
                <Icon name="sparkles" size={36} color="#D1D5DB" />
              </div>
              <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 8 }}>No matches found</div>
              <div style={{ color: '#6B7280', marginBottom: 24, maxWidth: 280 }}>We'll automatically match you with people who want the same products. Add more interests to find better matches!</div>
              <button className="btn-primary" style={{ padding: '12px 32px', fontSize: 15 }} onClick={() => navigate('/profile')}>Add Interests</button>
            </div>
          ) : matches.map(match => {
            const o = match.offer;
            return (
              <button key={o.id} onClick={() => navigate(`/chat/${o.id}`)} className="card" style={{ display: 'flex', gap: 12, padding: '14px', border: '1.5px solid #E5E9EF', borderRadius: 20, cursor: 'pointer', width: '100%', textAlign: 'left', transition: 'all 0.15s', background: '#fff', alignItems: 'center' }}>
                <div className="match-score-ring">{match.score}%</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 2 }}>
                    <div style={{ fontWeight: 800, fontSize: 14, lineHeight: 1.3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{o.title}</div>
                    <span className="savings-tag">${store.estimatedSavings(o)}/saved</span>
                  </div>
                  <div style={{ fontSize: 12, color: '#9CA3AF', fontWeight: 600, marginBottom: 4 }}>{o.store} · {o.joinedCount}/{o.neededCount} joined</div>
                  <div style={{ fontSize: 11, color: '#0071E3', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}>

function Chat({ offerId, store, navigate }) {
  const { offers, messages, myJoined, sendMessage, completeOffer, user, toggleMuteOffer, leaveOffer, myMuted } = store;

  const [hasLeft, setHasLeft] = useState(false);
  const bottomRef = useRef(null);
  const [showQr, setShowQr] = useState(false);

  const isJoined = myJoined.includes(id);

    bottomRef.current?.scrollIntoView({ behavior: 'smooth' });

    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', color: '#9CA3AF', fontWeight: 600 }}>

          </div>

            <div style={{ fontSize: 11, color: '#9CA3AF', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 3 }}>Group Deal Started</div>
            <div style={{ fontWeight: 800, fontSize: 14, color: '#111827' }}>{offer.title} at {offer.store}</div>
            <div style={{ fontSize: 12, color: '#9CA3AF', marginTop: 3 }}>${offer.pricePerPerson}/person · {offer.distance}km away</div>
