function MapScreen({ store, navigate }) {
  const { offers, myPassed, user } = store;
  const [activeCategory, setActiveCategory] = useState('All');
  const [mapMessage, setMapMessage] = useState('Finding your location…');
  const [userCoords, setUserCoords] = useState(null);
  const [mapReady, setMapReady] = useState(false);
  
  const mapNode = useRef(null);
  const mapRef = useRef(null);
  const markersRef = useRef([]);
  const userMarkerRef = useRef(null);

  // Helper: Haversine distance
  const getDistance = (lat1, lon1, lat2, lon2) => {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon/2) * Math.sin(dLon/2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R * c;
  };

  const filtered = React.useMemo(() => {
    return offers.filter(o => {
      if (o.status === 'completed' || myPassed.includes(o.id)) return false;
      if (activeCategory !== 'All' && o.category.toLowerCase() !== activeCategory.toLowerCase()) return false;
      
      // If we have user coordinates, calculate actual distance
      // Otherwise fallback to true (show all) until we have location
      if (userCoords && o.locationLat && o.locationLng) {
        const dist = getDistance(userCoords.lat, userCoords.lng, o.locationLat, o.locationLng);
        return dist <= (user.radiusKm || 5);
      }
      
      // Default: show if no user location yet (to prevent empty map)
      return true;
    });
  }, [offers, myPassed, activeCategory, userCoords, user.radiusKm]);

  const showLocation = useCallback(() => {
    if (!navigator.geolocation) return setMapMessage('Location not supported.');
    if (!window.L || !mapRef.current) return;
    setMapMessage('Finding your location…');
    navigator.geolocation.getCurrentPosition(({ coords }) => {
      const { latitude, longitude } = coords;
      setUserCoords({ lat: latitude, lng: longitude });
      mapRef.current.setView([latitude, longitude], 14);
      
      if (userMarkerRef.current) userMarkerRef.current.remove();
      
      const userIcon = window.L.divIcon({
        className: 'user-location-marker',
        html: `<div style="width:22px;height:22px;background:#10b981;border:3px solid #fff;border-radius:999px;box-shadow:0 0 12px rgba(16,185,129,0.5);position:relative;">
                <div style="position:absolute;inset:-8px;border-radius:999px;background:rgba(16,185,129,0.25);animation:pulse 2s infinite;"></div>
              </div>`,
        iconSize: [22, 22],
        iconAnchor: [11, 11]
      });

      userMarkerRef.current = window.L.marker([latitude, longitude], { icon: userIcon }).addTo(mapRef.current).bindPopup('You are here');
      setMapMessage('Showing deals near you');
    }, () => {
      setMapMessage('Location access denied.');
      mapRef.current.setView([37.7749, -122.4194], 13);
    }, { enableHighAccuracy: true });
  }, []);

  const resetView = useCallback(() => {
    if (mapRef.current) mapRef.current.setView([37.7749, -122.4194], 13);
  }, []);

  useEffect(() => {
    if (!window.L || mapRef.current) return;
    const map = window.L.map(mapNode.current, { zoomControl: false }).setView([37.7749, -122.4194], 13);
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
    mapRef.current = map;
    setMapReady(true);
    showLocation();
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, [showLocation]);

  useEffect(() => {
    if (!mapReady || !mapRef.current || !window.L) return;
    markersRef.current.forEach(m => m.remove());
    markersRef.current = filtered.filter(o => o.locationLat != null).map(o => {
      const marker = window.L.marker([o.locationLat, o.locationLng]).addTo(mapRef.current);
      marker.bindPopup(`<b>${o.store}</b><br>${o.title}<br><button onclick="window.location.hash='#/chat/${o.id}'" style="margin-top:8px;background:#0071E3;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-weight:700;cursor:pointer;width:100%">Join</button>`);
      return marker;
    });
  }, [filtered, mapReady]);

  return (
    <div style={{ height: '100dvh', position: 'relative', overflow: 'hidden' }}>
      <div ref={mapNode} style={{ position: 'absolute', inset: 0, zIndex: 0 }} />
      <header style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 20, padding: '48px 16px 16px', background: 'linear-gradient(to bottom,rgba(255,255,255,0.9),transparent)' }}>
        <div style={{ position: 'relative', marginBottom: 12 }}>
          <div style={{ position: 'absolute', left: 16, top: '50%', transform: 'translateY(-50%)' }}>
            <Icon name="search" size={18} color="#9CA3AF" />
          </div>
          <div style={{ width: '100%', minHeight: 52, padding: '15px 48px', borderRadius: 18, background: 'rgba(255,255,255,0.92)', boxShadow: '0 4px 16px rgba(0,0,0,0.08)', fontSize: 13, fontWeight: 600, color: '#374151' }}>{mapMessage}</div>
        </div>
        <div className="scrollbar-none" style={{ display: 'flex', gap: 8, overflowX: 'auto', paddingBottom: 4 }}>
          {['All', 'Food', 'Coffee', 'Groceries', 'Electronics'].map(c => (
            <button key={c} onClick={() => setActiveCategory(c)} className={`category-chip ${activeCategory === c ? 'category-chip-active' : ''}`} style={{ background: activeCategory === c ? '#111827' : 'rgba(255,255,255,0.88)', color: activeCategory === c ? '#fff' : '#374151', backdropFilter: 'blur(10px)', border: '1.5px solid rgba(255,255,255,0.4)', boxShadow: '0 2px 8px rgba(0,0,0,0.08)' }}>
              {c}
            </button>
          ))}
        </div>
      </header>

      <div style={{ position: 'absolute', bottom: 120, right: 16, zIndex: 20, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <button className="map-btn" onClick={resetView} title="Reset View"><Icon name="compass" size={22} color="#374151" /></button>
        <button className="map-btn" onClick={showLocation} title="My Location"><Icon name="navigation" size={22} color="#0071E3" /></button>
      </div>

      <div style={{ position: 'absolute', bottom: 100, left: 16, right: 80, zIndex: 20 }}>
        <div style={{ background: 'rgba(255,255,255,0.88)', backdropFilter: 'blur(20px)', border: '1.5px solid rgba(255,255,255,0.5)', borderRadius: 24, padding: '14px 18px', boxShadow: '0 8px 24px rgba(0,0,0,0.1)' }}>
          <div style={{ fontWeight: 800, fontSize: 16 }}>{filtered.length} Deals Nearby</div>
          <div style={{ fontSize: 13, color: '#9CA3AF', marginTop: 2 }}>Tap a pin to join a group</div>
        </div>
      </div>
    </div>
  );
}


function Profile({ store, navigate }) {
  const { user, offers, myJoined, mySaved, updateUser, logout, estimatedSavings } = store;

  const completedCount = offers.filter(o => o.status === 'completed' && myJoined.includes(o.id)).length;
  const totalSavings = offers.filter(o => o.status === 'completed').reduce((s, o) => s + o.pricePerPerson, 0);

  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({ displayName: user.displayName, interests: user.interests, profileImage: user.profileImage || null });
  const photoInput = useRef(null);
  const openEditor = () => { setDraft({ displayName: user.displayName, interests: user.interests, profileImage: user.profileImage || null }); setEditing(true); };
  const toggleInterest = interest => setDraft(d => ({ ...d, interests: d.interests.includes(interest) ? d.interests.filter(i => i !== interest) : [...d.interests, interest] }));
  const saveProfile = () => { updateUser({ displayName: draft.displayName.trim() || user.displayName, interests: draft.interests, profileImage: draft.profileImage }); setEditing(false); };

  return (
    <div style={{ minHeight: '100vh', background: '#F2F5F8' }}>
      <header className="header-blur" style={{ position: 'sticky', top: 0, zIndex: 50, padding: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontWeight: 800, fontSize: 20 }}>Profile</span>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button onClick={logout} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4 }} aria-label="Log out">
            <Icon name="log-out" size={22} color="#ef4444" />
          </button>
          <button onClick={openEditor} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4 }}>
            <Icon name="pencil" size={22} color="#0071E3" />
          </button>
        </div>
      </header>

      <main style={{ padding: '16px 16px 120px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        <div className="card" style={{ padding: '24px 20px', display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', position: 'relative', overflow: 'hidden' }}>
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 80, background: 'linear-gradient(135deg,rgba(0,113,227,0.15),rgba(16,185,129,0.08))' }} />
          <div style={{ position: 'relative', marginBottom: 14, marginTop: 20 }}>
            <div style={{ width: 88, height: 88, borderRadius: 999, background: 'rgba(0,113,227,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 900, fontSize: 26, color: '#0071E3', border: '4px solid #fff', boxShadow: '0 4px 16px rgba(0,0,0,0.1)', overflow: 'hidden' }}>
              {user.profileImage ? <img src={user.profileImage} alt="Profile" style={{ width: '100%', height: '100%', objectFit: 'cover' }} /> : user.displayName.slice(0, 2).toUpperCase()}
            </div>
            <div style={{ position: 'absolute', bottom: -2, right: -2, width: 26, height: 26, background: '#22c55e', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', border: '2px solid #fff' }}>
              <Icon name="shield-check" size={13} color="#fff" />
            </div>
          </div>
          <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 4 }}>{user.displayName}</div>
          <div style={{ fontSize: 13, color: '#9CA3AF', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4, marginBottom: 16 }}>
            <Icon name="map-pin" size={13} color="#9CA3AF" /> {(user.locationEnabled ?? true) ? 'Location Enabled' : 'Location Hidden'}
          </div>
          <div style={{ display: 'flex', background: '#F9FAFB', borderRadius: 16, padding: '10px 0', width: '100%', border: '1px solid #E5E9EF' }}>
            <div style={{ flex: 1, textAlign: 'center', borderRight: '1px solid #E5E9EF' }}>
              <div style={{ fontWeight: 900, fontSize: 24, color: '#0071E3' }}>{user.trustScore || 4.9}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Trust Score</div>
            </div>
            <div style={{ flex: 1, textAlign: 'center' }}>
              <div style={{ fontWeight: 900, fontSize: 24, color: '#111827' }}>{(user.completedDeals || 0) + completedCount}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF', textTransform: 'uppercase', letterSpacing: '0.04em' }}>Deals Done</div>
            </div>
          </div>
        </div>

        {/* Total Saved and Saved Deals removed per request */}

        <div className="card" style={{ padding: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <div style={{ fontWeight: 800, fontSize: 17 }}>My Interests</div>
            <button onClick={openEditor} style={{ color: '#0071E3', background: 'none', border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: 14 }}>Edit</button>
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            {(user.interests || []).length > 0 ? (user.interests || []).map((interest, i) => (
              <span key={i} style={{ padding: '8px 16px', borderRadius: 999, background: '#F3F4F6', fontSize: 13, fontWeight: 700, color: '#374151', border: '1px solid #E5E9EF' }}>{interest}</span>
            )) : <span style={{ fontSize: 13, color: '#9CA3AF' }}>No interests added yet.</span>}
          </div>
        </div>

        <div className="card" style={{ padding: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>Location Radius</div>
              <div style={{ fontSize: 13, color: '#9CA3AF', marginTop: 2 }}>Finding deals within {(user.radiusKm || 5)}km</div>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              {[1, 3, 5, 10].map(r => (
                <button key={r} onClick={() => store.updateUser({ radiusKm: r })} style={{ width: 36, height: 36, borderRadius: 999, background: (user.radiusKm || 5) === r ? '#0071E3' : '#F3F4F6', color: (user.radiusKm || 5) === r ? '#fff' : '#374151', border: 'none', cursor: 'pointer', fontWeight: 700, fontSize: 12 }}>{r}</button>
              ))}
            </div>
          </div>
        </div>

        {/* Professional feature: Quick Stats */}
        <div className="card" style={{ padding: 20 }}>
          <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 12 }}>Quick Stats</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
            <div style={{ background: '#F9FAFB', borderRadius: 12, padding: 12, textAlign: 'center' }}>
              <div style={{ fontWeight: 900, fontSize: 20, color: '#0071E3' }}>{offers.filter(o => myJoined.includes(o.id)).length}</div>
              <div style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF' }}>Total Deals</div>
            </div>
              <div style={{ background: '#F9FAFB', borderRadius: 12, padding: 12, textAlign: 'center' }}>
              <div style={{ fontWeight: 900, fontSize: 20, color: '#15803d' }}>
                {user.myPools?.length || 0}
              </div>
              <div style={{ fontSize: 10, fontWeight: 700, color: '#9CA3AF' }}>Pool Joins</div>
            </div>
          </div>
        </div>
      </main>

      {editing && <div style={{ position: 'fixed', inset: 0, zIndex: 200, background: 'rgba(17,24,39,.48)', display: 'flex', alignItems: 'flex-end' }}>
        <div style={{ width: '100%', maxHeight: '88dvh', overflowY: 'auto', background: '#F9FAFB', borderRadius: '24px 24px 0 0', padding: '22px 16px 32px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 18 }}>
            <strong style={{ fontSize: 20 }}>Edit profile</strong>
            <button onClick={() => setEditing(false)} style={{ border: 0, background: 'none', fontSize: 24, cursor: 'pointer' }}>×</button>
          </div>
          <input ref={photoInput} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => {
            const file = e.target.files?.[0];
            if (file) { const reader = new FileReader(); reader.onload = () => setDraft(d => ({ ...d, profileImage: reader.result })); reader.readAsDataURL(file); }
          }} />
          <button onClick={() => photoInput.current?.click()} style={{ width: '100%', border: '1.5px dashed #0071E3', background: '#fff', borderRadius: 16, padding: 14, marginBottom: 16, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12 }}>
            <Icon name="camera" size={20} color="#0071E3" />
            <span style={{ fontWeight: 700 }}>Choose profile photo from gallery</span>
          </button>
          <label style={{ display: 'block', fontSize: 12, fontWeight: 800, color: '#6B7280', marginBottom: 6 }}>USERNAME</label>
          <input value={draft.displayName} onChange={e => setDraft(d => ({ ...d, displayName: e.target.value }))} style={{ width: '100%', height: 48, borderRadius: 12, border: '1px solid #E5E9EF', padding: '0 12px', fontSize: 16, marginBottom: 18 }} />
          <div style={{ fontWeight: 800, marginBottom: 8 }}>Interests ({draft.interests.length})</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 22 }}>
            {ALL_INTERESTS.map(interest => (
              <button key={interest} onClick={() => toggleInterest(interest)} className={`interest-chip ${draft.interests.includes(interest) ? 'interest-chip-active' : 'interest-chip-inactive'}`}>{interest}</button>
            ))}
          </div>
          <button className="btn-primary" onClick={saveProfile} style={{ width: '100%', height: 52, fontSize: 16 }}>Save changes</button>
        </div>
      </div>}
    </div>
  );
}


function Notifications({ store, navigate }) {
  const { notifications, markNotificationRead } = store;

  const getIcon = (kind) => {
    if (kind === 'join') return { name: 'users', color: '#3b82f6' };
    if (kind === 'done') return { name: 'check-circle-2', color: '#22c55e' };
    if (kind === 'system') return { name: 'shield-alert', color: '#8b5cf6' };
    return { name: 'bell', color: '#0071E3' };
  };

  return (
    <div style={{ minHeight: '100vh', background: '#F2F5F8' }}>
      <header className="header-blur" style={{ position: 'sticky', top: 0, zIndex: 50, padding: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button onClick={() => navigate('/')} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4, borderRadius: 999 }}>
          <Icon name="arrow-left" size={24} color="#374151" />
        </button>
        <span style={{ fontWeight: 800, fontSize: 20 }}>Notifications</span>
        <div style={{ width: 28 }} />
      </header>

      <main style={{ padding: '12px 16px 120px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        {notifications.length === 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 16px', textAlign: 'center' }}>
            <div style={{ width: 80, height: 80, background: '#fff', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20, border: '1.5px solid #E5E9EF' }}>
              <Icon name="bell" size={36} color="#D1D5DB" />
            </div>
            <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 8 }}>All caught up!</div>
            <div style={{ color: '#6B7280', maxWidth: 240 }}>You don't have any new notifications right now.</div>
          </div>
        ) : notifications.map(notif => {
          const icon = getIcon(notif.kind);
          return (
            <button key={notif.id} onClick={() => { markNotificationRead(notif.id); if (notif.offerId) navigate(`/chat/${notif.offerId}`); }} className={notif.read ? 'notif-read' : 'notif-unread'} style={{ display: 'flex', gap: 12, padding: '14px 14px', borderRadius: 18, cursor: 'pointer', width: '100%', textAlign: 'left', border: 'none', transition: 'all 0.15s', background: notif.read ? 'rgba(255,255,255,0.4)' : '#fff', borderTop: notif.read ? '1px solid rgba(0,0,0,0.04)' : '1.5px solid rgba(0,113,227,0.12)' }}>
              <div style={{ width: 48, height: 48, borderRadius: 999, background: notif.read ? '#F3F4F6' : 'rgba(0,113,227,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                <Icon name={icon.name} size={20} color={notif.read ? '#D1D5DB' : icon.color} />
              </div>
              <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 3 }}>
                  <div style={{ fontWeight: notif.read ? 600 : 800, fontSize: 14, color: '#111827', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: '80%' }}>{notif.title}</div>
                  {!notif.read && <div style={{ width: 7, height: 7, borderRadius: 999, background: '#0071E3', flexShrink: 0, marginTop: 4 }} />}
                </div>
                <div style={{ fontSize: 12, color: '#9CA3AF', lineHeight: 1.45, marginBottom: 4, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>{notif.text}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: '#C4C9D4', textTransform: 'uppercase', letterSpacing: '0.05em' }}>{timeAgo(notif.createdAt)}</div>
              </div>
            </button>
          );
        })}
      </main>
    </div>
  );
}


function SavedOffers({ store, navigate }) {
  const { offers, mySaved, myJoined, unsaveOffer, joinOffer, passOffer, estimatedSavings } = store;
  const saved = offers.filter(o => mySaved.includes(o.id));

  return (
    <div style={{ minHeight: '100vh', background: '#F2F5F8' }}>
      <header className="header-blur" style={{ position: 'sticky', top: 0, zIndex: 50, padding: '16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <button onClick={() => navigate('/profile')} style={{ background: 'transparent', border: 'none', cursor: 'pointer', padding: 4 }}>
          <Icon name="arrow-left" size={24} color="#374151" />
        </button>
        <span style={{ fontWeight: 800, fontSize: 20 }}>Saved Deals</span>
        <div style={{ width: 28 }} />
      </header>

      <main style={{ padding: '16px 16px 120px', display: 'flex', flexDirection: 'column', gap: 16 }}>
        {saved.length === 0 ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '80px 16px', textAlign: 'center' }}>
            <div style={{ width: 80, height: 80, background: '#fff', borderRadius: 999, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20, border: '1.5px solid #E5E9EF' }}>
              <Icon name="search" size={36} color="#D1D5DB" />
            </div>
            <div style={{ fontWeight: 800, fontSize: 20, marginBottom: 8 }}>No saved deals</div>
            <div style={{ color: '#6B7280', marginBottom: 24, maxWidth: 240 }}>Keep track of deals you like by saving them to your list.</div>
            <button className="btn-primary" style={{ padding: '12px 32px', fontSize: 15 }} onClick={() => navigate('/')}>Browse Deals</button>
          </div>
        ) : saved.map((offer, idx) => (
          <div key={offer.id} style={{ position: 'relative' }}>
            <OfferCard
              offer={{ ...offer, saved: true }}
              isJoined={myJoined.includes(offer.id)}
              savings={estimatedSavings(offer)}
              style={{ animationDelay: `${idx * 60}ms` }}
              onJoin={() => joinOffer(offer.id)}
              onPass={() => passOffer(offer.id)}
              onChatClick={() => navigate(`/chat/${offer.id}`)}
            />
            <button onClick={() => unsaveOffer(offer.id)} style={{ position: 'absolute', top: 12, right: 12, background: 'rgba(255,255,255,0.92)', border: 'none', borderRadius: 999, padding: '6px 12px', fontSize: 12, fontWeight: 700, cursor: 'pointer', color: '#ef4444', boxShadow: '0 2px 8px rgba(0,0,0,0.1)', backdropFilter: 'blur(8px)', zIndex: 5 }}>
              Unsave
            </button>
          </div>
        ))}
      </main>
    </div>
  );
}


const ALL_INTERESTS = ['Coffee', 'Tea', 'Groceries', 'Dining Out', 'Fast Food', 'Baking', 'Electronics', 'Gaming', 'Phones', 'Computers', 'Beauty', 'Skincare', 'Makeup', 'Clothing', 'Shoes', 'Jewelry', 'Fitness', 'Yoga', 'Running', 'Cycling', 'Home Goods', 'Furniture', 'Decor', 'DIY', 'Books', 'Music', 'Movies', 'Streaming', 'Travel', 'Hotels', 'Flights', 'Cars', 'Pets', 'Baby', 'Kids', 'Art', 'Photography', 'Gardening', 'Outdoors', 'Camping', 'Sports', 'Health', 'Wellness', 'Subscriptions', 'Education', 'Local Events', 'Sustainable Living', 'Crafts'];


function Onboarding({ store, navigate }) {
  const { updateUser } = store;
  const [selected, setSelected] = useState([]);
  const [locationEnabled, setLocationEnabled] = useState(true);
  const [loading, setLoading] = useState(false);

  const toggle = (i) => setSelected(prev => prev.includes(i) ? prev.filter(x => x !== i) : [...prev, i]);

  const handleStart = () => {
    setLoading(true);
    updateUser({ interests: selected, locationEnabled });
    setTimeout(() => navigate('/'), 500);
  };

  return (
    <div style={{ minHeight: '100dvh', background: '#F2F5F8', display: 'flex', flexDirection: 'column' }}>
      <main style={{ flex: 1, padding: '48px 24px 24px', display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
          <div style={{ width: 64, height: 64, background: '#0071E3', borderRadius: 20, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 28, transform: 'rotate(12deg)', boxShadow: '0 8px 24px rgba(0,113,227,0.35)' }}>
            <span style={{ fontWeight: 900, fontSize: 28, color: '#fff', transform: 'rotate(-12deg)', display: 'block' }}>S</span>
          </div>
          <h1 style={{ fontWeight: 900, fontSize: 36, lineHeight: 1.1, letterSpacing: '-0.03em', marginBottom: 12, color: '#111827' }}>Welcome to SplitDeal.</h1>
          <p style={{ fontSize: 16, color: '#6B7280', fontWeight: 500, lineHeight: 1.6, marginBottom: 36 }}>Team up with locals to unlock group discounts on things you buy everyday.</p>

          <div style={{ marginBottom: 28 }}>
            <div style={{ fontWeight: 800, fontSize: 17, marginBottom: 14 }}>What do you buy most?</div>
            <div style={{ display: 'flex', flexWrap: 'wrap', gap: 10 }}>
              {ALL_INTERESTS.map(i => (
                <button key={i} onClick={() => toggle(i)} className={`interest-chip ${selected.includes(i) ? 'interest-chip-active' : 'interest-chip-inactive'}`}>
                  {i}
                </button>
              ))}
            </div>
          </div>

          <div className="card" style={{ padding: '16px 18px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 40, height: 40, borderRadius: 999, background: 'rgba(0,113,227,0.1)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name="map-pin" size={20} color="#0071E3" />
              </div>
              <div>
                <div style={{ fontWeight: 700, fontSize: 14 }}>Find Local Deals</div>
                <div style={{ fontSize: 12, color: '#9CA3AF', marginTop: 1 }}>Use location to find nearby groups</div>
              </div>
            </div>
            <button onClick={() => setLocationEnabled(v => !v)} style={{ width: 48, height: 28, borderRadius: 999, background: locationEnabled ? '#0071E3' : '#E5E9EF', border: 'none', cursor: 'pointer', position: 'relative', transition: 'background 0.2s', flexShrink: 0 }}>
              <div style={{ width: 22, height: 22, borderRadius: 999, background: '#fff', position: 'absolute', top: 3, left: locationEnabled ? 23 : 3, transition: 'left 0.2s', boxShadow: '0 1px 4px rgba(0,0,0,0.2)' }} />
            </button>
          </div>
        </div>

        <div style={{ paddingTop: 24 }}>
          <button className="btn-primary" style={{ width: '100%', height: 56, fontSize: 17, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, boxShadow: '0 6px 20px rgba(0,113,227,0.32)' }} onClick={handleStart} disabled={loading}>
            {loading ? 'Loading...' : 'Start Saving'}
            {!loading && <Icon name="arrow-right" size={18} color="#fff" />}
          </button>
          <div style={{ textAlign: 'center', fontSize: 11, color: '#9CA3AF', fontWeight: 600, marginTop: 12 }}>By continuing, you agree to our Terms & Privacy Policy</div>
        </div>
      </main>
    </div>
  );
}


function App() {
  const { path, navigate } = useRouter();
  const store = useStore();

  const getPage = () => {
    if (path === '/') return <Home store={store} navigate={navigate} />;
    if (path === '/create') return <CreateOffer store={store} navigate={navigate} />;
    if (path === '/matches') return <Matches store={store} navigate={navigate} />;
    if (path === '/map') return <MapScreen store={store} navigate={navigate} />;
    if (path === '/profile') return <Profile store={store} navigate={navigate} />;
    if (path === '/notifications') return <Notifications store={store} navigate={navigate} />;
    if (path === '/saved') return <SavedOffers store={store} navigate={navigate} />;
    if (path === '/onboarding') return <Onboarding store={store} navigate={navigate} />;
    if (path.startsWith('/chat/')) {
      const offerId = path.replace('/chat/', '');
      return <Chat offerId={offerId} store={store} navigate={navigate} />;
    }
    return <Home store={store} navigate={navigate} />;
  };

  return (
    <div style={{ maxWidth: 430, margin: '0 auto', minHeight: '100vh', position: 'relative', background: '#F2F5F8', borderLeft: '1px solid #E5E9EF', borderRight: '1px solid #E5E9EF', boxShadow: '0 0 40px rgba(0,0,0,0.06)' }}>
      {getPage()}
      <BottomNav path={path} navigate={navigate} unreadCount={store.unreadCount} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
